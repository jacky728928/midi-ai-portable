            <p>景德镇古窑民俗博览区是国家级非物质文化遗产生产性保护示范基地，位于景德镇市瓷都大道古窑路1号，是国家AAAAA级旅游景区。景区内有古代制瓷作坊、世界上最古老制瓷生产作业线、清代镇窑、明代葫芦窑、元代馒头窑、宋代龙窑、风火仙师庙、瓷行等景点，向人们展示了古代瓷业建筑，明清时期景德镇手工制瓷的工艺过程以及传统名瓷精品。</p>
