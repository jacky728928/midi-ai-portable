            <p>白鹿洞书院，位于江西省九江市庐山五老峰南麓，是中国古代四大书院之一，享有"海内第一书院"之誉。书院始建于南唐升元年间（940年），宋代理学家朱熹在此讲学，制定了著名的《白鹿洞书院揭示》，成为后世书院办学的典范。</p>
